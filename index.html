<!DOCTYPE html>
<html>
<body>

<h2>Valorant API Test</h2>

<input id="name" placeholder="Pseudo (ex: Faker)">
<input id="tag" placeholder="TAG (ex: EUW)">
<button onclick="searchPlayer()">Rechercher</button>

<pre id="result"></pre>

<script>
async function searchPlayer() {

  const name = document.getElementById("name").value;
  const tag = document.getElementById("tag").value;

  const API_KEY = "RGAPI-eb7e7f4c-7652-4742-bd3d-7a5cd671b60b";

  // Endpoint Valorant Account API
  const url = `https://europe.api.riotgames.com/riot/account/v1/accounts/by-riot-id/${name}/${tag}`;

  try {
    const res = await fetch(url, {
      headers: {
        "X-Riot-Token": RGAPI-eb7e7f4c-7652-4742-bd3d-7a5cd671b60b
      }
    });

    const data = await res.json();

    document.getElementById("result").textContent =
      JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("result").textContent =
      "Erreur: " + err;
  }
}
</script>

</body>
</html>
